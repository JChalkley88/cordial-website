<style>
  :root {
    --cream:#F2EBDC; --slate:#2D4A5C; --aubergine:#5C3349;
    --ink:#1F2937; --body:#4A5560;
    --hairline:rgba(45,74,92,0.16); --tint:rgba(45,74,92,0.06);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body {
    background:var(--cream); color:var(--body);
    font-family:"Source Sans 3", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    min-height:100dvh; display:flex; align-items:flex-start; justify-content:center;
    padding:56px 24px calc(40px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .card { width:100%; max-width:400px; }
  .brand { margin-bottom:52px; }
  .wordmark { font-family:"Karla",sans-serif; font-weight:600; font-size:30px; letter-spacing:-0.4px; color:var(--slate); line-height:1; }
  .descriptor { font-weight:600; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--slate); margin-top:8px; }
  .name { font-family:"Karla",sans-serif; font-weight:500; font-size:27px; color:var(--ink); line-height:1.1; margin:0; }
  .role { font-size:15px; color:var(--body); margin-top:6px; }
  .accent { width:44px; height:2px; background:var(--aubergine); border:0; margin:22px 0 30px; }
  .save {
    display:block; width:100%; background:var(--slate); color:var(--cream);
    font-family:"Source Sans 3",sans-serif; font-weight:600; font-size:16px; letter-spacing:0.2px;
    border:0; border-radius:4px; padding:15px 18px; cursor:pointer; text-align:center; transition:opacity .15s ease;
  }
  .save:active { opacity:0.82; }
  .save:focus-visible { outline:2px solid var(--aubergine); outline-offset:3px; }
  .qrtoggle {
    display:block; width:100%; margin-top:14px; background:none; border:0; cursor:pointer;
    font-family:"Source Sans 3",sans-serif; font-weight:600; font-size:14px; color:var(--slate);
    text-align:center; padding:6px; text-decoration:underline; text-underline-offset:4px;
  }
  .qrtoggle:focus-visible { outline:2px solid var(--aubergine); outline-offset:3px; border-radius:2px; }
  .qrpanel { display:none; margin-top:18px; text-align:center; }
  .qrpanel.open { display:block; }
  .qrpanel img { width:220px; height:220px; image-rendering:pixelated; border:1px solid var(--hairline); border-radius:6px; }
  .qrcaption { font-size:12px; letter-spacing:0.3px; color:var(--body); margin-top:12px; }
  .actions { margin-top:20px; }
  .row {
    display:flex; align-items:baseline; justify-content:space-between; gap:16px;
    padding:15px 4px; border-top:1px solid var(--hairline); color:var(--slate);
    text-decoration:none; transition:background .12s ease;
  }
  .actions .row:last-child { border-bottom:1px solid var(--hairline); }
  .row:active { background:var(--tint); }
  .row:focus-visible { outline:2px solid var(--aubergine); outline-offset:-2px; border-radius:2px; }
  .row .label { font-weight:600; font-size:15px; color:var(--slate); }
  .row .value { font-size:14px; color:var(--body); text-align:right; word-break:break-word; }
  .foot { margin-top:40px; font-size:11px; letter-spacing:0.3px; color:var(--body); opacity:0.8; }
  .foot a { color:inherit; text-decoration:none; }
  @media (prefers-reduced-motion: reduce) { * { transition:none !important; } }
</style>
